<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance — StaffSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Attendance', 'Mark daily attendance')}"></div>

        <div class="page-content">
            <div class="page-header">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/attendance}">Attendance</a></li>
                        <li class="breadcrumb-item active">Mark Attendance</li>
                    </ol>
                </nav>
                <h3>Mark Attendance</h3>
                <p>Record attendance for <strong th:text="${today}">2026-06-23</strong></p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Employee <span style="color: #ef4444;">*</span></label>
                                <select class="form-select">
                                    <option>Select employee...</option>
                                    <option>Sarah Johnson — Engineering</option>
                                    <option>Michael Chen — Marketing</option>
                                    <option>Emily Rodriguez — Finance</option>
                                    <option>David Kim — Engineering</option>
                                    <option>Lisa Thompson — HR</option>
                                    <option>James Wilson — Operations</option>
                                    <option>Anna Martinez — Engineering</option>
                                    <option>Robert Brown — Marketing</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date <span style="color: #ef4444;">*</span></label>
                                <input type="date" class="form-control" th:value="${today}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Check In</label>
                                <input type="time" class="form-control" value="09:00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Check Out</label>
                                <input type="time" class="form-control" value="17:00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Status <span style="color: #ef4444;">*</span></label>
                                <select class="form-select">
                                    <option>Present</option>
                                    <option>Absent</option>
                                    <option>Late</option>
                                    <option>Half Day</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Remarks</label>
                                <input type="text" class="form-control" placeholder="Optional notes">
                            </div>
                            <div class="col-12 d-flex gap-2 justify-content-end pt-3 border-top">
                                <a th:href="@{/attendance}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i> Save Attendance
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
