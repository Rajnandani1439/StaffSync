<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance — StaffSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Attendance', 'Mark daily attendance')}"></div>

        <div class="page-content">
            <div class="page-header">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/attendance}">Attendance</a></li>
                        <li class="breadcrumb-item active">Mark Attendance</li>
                    </ol>
                </nav>
                <h3>Mark Attendance</h3>
                <p>Record attendance for <strong th:text="${today}">2026-06-23</strong></p>
            </div>

            <div class="card">
                <div class="card-body">
                    <div th:if="${errorMessage}" class="alert alert-danger py-2 mb-3" style="font-size: 13px;">
                        <i class="bi bi-exclamation-circle me-1"></i> <span th:text="${errorMessage}">Error</span>
                    </div>
                    <form th:action="@{/attendance/save}" th:object="${attendance}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Employee <span style="color: #ef4444;">*</span></label>
                                <select class="form-select" name="employeeId" required>
                                    <option value="">Select employee...</option>
                                    <option th:each="emp : ${employees}" th:value="${emp.id}"
                                            th:text="${emp.firstName + ' ' + emp.lastName + ' — ' + emp.department}">Sarah Johnson</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Date <span style="color: #ef4444;">*</span></label>
                                <input type="date" class="form-control" th:field="*{date}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Check In</label>
                                <input type="time" class="form-control" th:field="*{checkIn}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Check Out</label>
                                <input type="time" class="form-control" th:field="*{checkOut}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Status <span style="color: #ef4444;">*</span></label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="">Select status</option>
                                    <option value="Present">Present</option>
                                    <option value="Absent">Absent</option>
                                    <option value="Late">Late</option>
                                    <option value="Half Day">Half Day</option>
                                </select>
                            </div>
                            <div class="col-12 d-flex gap-2 justify-content-end pt-3 border-top">
                                <a th:href="@{/attendance}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i> Save Attendance
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
