<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Report — StaffSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Attendance Report', 'Monthly attendance summary')}"></div>

        <div class="page-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/attendance}">Attendance</a></li>
                            <li class="breadcrumb-item active">Monthly Report</li>
                        </ol>
                    </nav>
                    <h3>Monthly Attendance Report</h3>
                    <p>June 2026 — Summary of attendance records</p>
                </div>
                <div>
                    <button class="btn btn-outline-primary" onclick="window.print()">
                        <i class="bi bi-printer me-1"></i> Print Report
                    </button>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 style="font-weight: 700; color: #0f172a; margin: 0;">
                            <i class="bi bi-bar-chart me-2" style="color: var(--primary);"></i>Employee Attendance Summary
                        </h5>
                        <div class="d-flex gap-2">
                            <select class="form-select" style="width: auto;">
                                <option>June 2026</option>
                                <option>May 2026</option>
                                <option>April 2026</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Department</th>
                                    <th>Present</th>
                                    <th>Absent</th>
                                    <th>Late</th>
                                    <th>Half Day</th>
                                    <th>Total Days</th>
                                    <th>Attendance %</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="row : ${report}">
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <span style="font-weight: 500;" th:text="${row.employee}">Sarah Johnson</span>
                                        </div>
                                    </td>
                                    <td th:text="${row.department}">Engineering</td>
                                    <td th:text="${row.present}" style="font-weight: 600; color: #16a34a;">21</td>
                                    <td th:text="${row.absent}" style="color: #ef4444;">1</td>
                                    <td th:text="${row.late}" style="color: #f59e0b;">0</td>
                                    <td th:text="${row.halfDay}">0</td>
                                    <td th:text="${row.total}" style="font-weight: 600;">22</td>
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="progress flex-grow-1" style="height: 6px;">
                                                <div class="progress-bar" role="progressbar"
                                                     th:style="${'width: ' + (row.total > 0 ? (row.present * 100 / row.total) : 0) + '%'}"
                                                     th:classappend="${(row.present * 100 / row.total) >= 90 ? 'bg-success' : (row.present * 100 / row.total) >= 75 ? 'bg-warning' : 'bg-danger'}"
                                                     style="width: 95%;"></div>
                                            </div>
                                            <span style="font-size: 12px; font-weight: 600; min-width: 36px;"
                                                  th:text="${row.total > 0 ? #numbers.formatDecimal(row.present * 100 / row.total, 0, 2) : 0} + '%'">95%</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
