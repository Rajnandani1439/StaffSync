<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StaffSync — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-brand">
            <div class="brand-icon-lg">
                <i class="bi bi-people-fill"></i>
            </div>
            <h2>StaffSync</h2>
            <p>Smart Human Resource Management System</p>
        </div>

        <div th:if="${logoutMessage}" class="alert alert-success py-2 mb-3" style="font-size: 13px;">
            <i class="bi bi-check-circle me-1"></i> You have been logged out.
        </div>
        <div th:if="${loginError}" class="alert alert-danger py-2 mb-3" style="font-size: 13px;">
            <i class="bi bi-exclamation-circle me-1"></i> Invalid username or password.
        </div>

        <form th:action="@{/auth/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 10px 0 0 10px; border: 1.5px solid #e2e8f0; background: #f8fafc;">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" value="admin" style="border-radius: 0 10px 10px 0;">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 10px 0 0 10px; border: 1.5px solid #e2e8f0; background: #f8fafc;">
                        <i class="bi bi-lock"></i>
                    </span>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" style="border-radius: 0 10px 10px 0;">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid #f1f5f9;">
            <p style="font-size: 12px; color: #94a3b8; margin: 0;">
                Demo credentials: <strong>admin</strong> / <strong>admin123</strong>
            </p>
        </div>
    </div>
</body>
</html>
