<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Employee — StaffSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Employees', 'Add new employee record')}"></div>

        <div class="page-content">
            <div class="page-header">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/employees}">Employees</a></li>
                        <li class="breadcrumb-item active">Add Employee</li>
                    </ol>
                </nav>
                <h3>Add New Employee</h3>
                <p>Fill in the details below to register a new employee</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form>
                        <div class="row g-4 mb-4">
                            <div class="col-12">
                                <h6 style="font-weight: 700; color: #0f172a;">
                                    <i class="bi bi-person-badge me-2" style="color: var(--primary);"></i>Personal Information
                                </h6>
                                <hr>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">First Name <span style="color: #ef4444;">*</span></label>
                                <input type="text" class="form-control" placeholder="Enter first name">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Last Name <span style="color: #ef4444;">*</span></label>
                                <input type="text" class="form-control" placeholder="Enter last name">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Email <span style="color: #ef4444;">*</span></label>
                                <input type="email" class="form-control" placeholder="email@company.com">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Phone</label>
                                <input type="text" class="form-control" placeholder="+1 555-0000">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" placeholder="Street address">
                            </div>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-12">
                                <h6 style="font-weight: 700; color: #0f172a;">
                                    <i class="bi bi-briefcase me-2" style="color: var(--primary);"></i>Employment Details
                                </h6>
                                <hr>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Department <span style="color: #ef4444;">*</span></label>
                                <select class="form-select">
                                    <option>Select department</option>
                                    <option>Engineering</option>
                                    <option>Marketing</option>
                                    <option>Finance</option>
                                    <option>Human Resources</option>
                                    <option>Operations</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Position <span style="color: #ef4444;">*</span></label>
                                <input type="text" class="form-control" placeholder="Job title">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Hire Date <span style="color: #ef4444;">*</span></label>
                                <input type="date" class="form-control">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Base Salary ($) <span style="color: #ef4444;">*</span></label>
                                <input type="number" class="form-control" placeholder="Annual salary">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Status</label>
                                <select class="form-select">
                                    <option>Active</option>
                                    <option>Inactive</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end pt-3 border-top">
                            <a th:href="@{/employees}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i> Save Employee
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
