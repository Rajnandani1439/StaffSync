<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Profile — StaffSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Employee Profile', 'View employee details')}"></div>

        <div class="page-content">
            <div class="page-header">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/employees}">Employees</a></li>
                        <li class="breadcrumb-item active" th:text="${employee.firstName + ' ' + employee.lastName}">Profile</li>
                    </ol>
                </nav>
            </div>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <div class="avatar-circle" style="width: 80px; height: 80px; font-size: 28px; margin: 0 auto 16px;"
                                 th:style="${'width: 80px; height: 80px; font-size: 28px; margin: 0 auto 16px; background: ' + (employee.id % 2 == 0 ? '#7c3aed' : '#1a56db')}">
                                <span th:text="${#strings.substring(employee.firstName, 0, 1) + #strings.substring(employee.lastName, 0, 1)}">SJ</span>
                            </div>
                            <h4 style="font-weight: 700;" th:text="${employee.firstName + ' ' + employee.lastName}">Sarah Johnson</h4>
                            <p style="color: #64748b;" th:text="${employee.position}">Senior Developer</p>
                            <span class="badge-status" th:classappend="${employee.status == 'Active' ? 'active' : employee.status == 'On Leave' ? 'on-leave' : 'inactive'}"
                                  th:text="${employee.status}">Active</span>

                            <hr>
                            <div style="text-align: left;">
                                <p style="font-size: 13px; margin-bottom: 8px;">
                                    <i class="bi bi-envelope me-2" style="color: #64748b;"></i>
                                    <span th:text="${employee.email}">sarah@email.com</span>
                                </p>
                                <p style="font-size: 13px; margin-bottom: 8px;">
                                    <i class="bi bi-telephone me-2" style="color: #64748b;"></i>
                                    <span th:text="${employee.phone}">+1 555-0101</span>
                                </p>
                                <p style="font-size: 13px; margin-bottom: 0;">
                                    <i class="bi bi-building me-2" style="color: #64748b;"></i>
                                    <span th:text="${employee.department}">Engineering</span>
                                </p>
                            </div>

                            <hr>
                            <div class="d-flex gap-2 justify-content-center">
                                <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-primary btn-sm">
                                    <i class="bi bi-pencil me-1"></i> Edit Profile
                                </a>
                                <a th:href="@{/employees}" class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-arrow-left me-1"></i> Back
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card">
                        <div class="card-body">
                            <h5 style="font-weight: 700; color: #0f172a; margin-bottom: 20px;">
                                <i class="bi bi-info-circle me-2" style="color: var(--primary);"></i>Employment Details
                            </h5>
                            <table class="table table-borderless" style="font-size: 14px;">
                                <tr>
                                    <td style="width: 180px; color: #64748b; font-weight: 500;">Employee ID</td>
                                    <td style="font-weight: 600;" th:text="${'EMP-' + #strings.padStart(#strings.replace(#strings.length(employee.id.toString()), '', ''), 3, '0')}">EMP-001</td>
                                </tr>
                                <tr>
                                    <td style="color: #64748b; font-weight: 500;">Department</td>
                                    <td th:text="${employee.department}">Engineering</td>
                                </tr>
                                <tr>
                                    <td style="color: #64748b; font-weight: 500;">Position</td>
                                    <td th:text="${employee.position}">Senior Developer</td>
                                </tr>
                                <tr>
                                    <td style="color: #64748b; font-weight: 500;">Hire Date</td>
                                    <td th:text="${employee.hireDate}">2022-03-15</td>
                                </tr>
                                <tr>
                                    <td style="color: #64748b; font-weight: 500;">Base Salary</td>
                                    <td style="font-weight: 700; font-size: 16px;" th:text="${'$' + #numbers.formatDecimal(employee.salary, 0, 'COMMA', 0, 'POINT')}">$85,000</td>
                                </tr>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
