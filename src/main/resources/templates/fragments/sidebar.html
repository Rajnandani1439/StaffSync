<th:block th:fragment="sidebar">
    <nav class="sidebar" id="sidebar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
        <div class="sidebar-brand d-flex align-items-center gap-3">
            <div class="brand-icon">
                <i class="bi bi-people-fill"></i>
            </div>
            <div>
                <h5>StaffSync</h5>
                <small>Smart HRMS</small>
            </div>
        </div>

        <div class="sidebar-menu">
            <div class="menu-label">Main Menu</div>

            <a th:href="@{/dashboard}" class="nav-item" th:classappend="${currentPage == 'dashboard' ? 'active' : ''}">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/employees}" class="nav-item" th:classappend="${currentPage == 'employees' ? 'active' : ''}">
                <i class="bi bi-person-badge-fill"></i>
                <span>Employees</span>
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/attendance}" class="nav-item" th:classappend="${currentPage == 'attendance' ? 'active' : ''}">
                <i class="bi bi-calendar-check-fill"></i>
                <span>Attendance</span>
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/leave}" class="nav-item" th:classappend="${currentPage == 'leave' ? 'active' : ''}">
                <i class="bi bi-file-earmark-text-fill"></i>
                <span>Leave</span>
            </a>

            <div sec:authorize="hasRole('ADMIN')" class="menu-label mt-3">Finance</div>

            <a sec:authorize="hasRole('ADMIN')" th:href="@{/payroll}" class="nav-item" th:classappend="${currentPage == 'payroll' ? 'active' : ''}">
                <i class="bi bi-wallet-fill"></i>
                <span>Payroll</span>
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/reports}" class="nav-item" th:classappend="${currentPage == 'reports' ? 'active' : ''}">
                <i class="bi bi-graph-up-arrow"></i>
                <span>Reports</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="d-flex align-items-center gap-3">
                <div class="avatar-circle" style="background: var(--primary);">
                    <span th:text="${#strings.substring(#authentication.name, 0, 2).toUpperCase()}">AD</span>
                </div>
                <div class="user-info">
                    <strong sec:authentication="name">Admin</strong>
                    <span sec:authorize="hasRole('ADMIN')"><i class="bi bi-shield-fill-check me-1" style="font-size: 11px;"></i> Administrator</span>
                    <span sec:authorize="hasRole('EMPLOYEE')"><i class="bi bi-person me-1" style="font-size: 11px;"></i> Employee</span>
                </div>
            </div>
            <form th:action="@{/auth/logout}" method="post" style="margin-top: 12px;">
                <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </form>
        </div>
    </nav>
</th:block>
