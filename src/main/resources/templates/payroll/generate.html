<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Payroll — StaffSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Payroll', 'Generate salary for an employee')}"></div>

        <div class="page-content">
            <div class="page-header">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/payroll}">Payroll</a></li>
                        <li class="breadcrumb-item active">Generate Payroll</li>
                    </ol>
                </nav>
                <h3>Generate Payroll</h3>
                <p>Create a new payroll record for an employee</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <div th:if="${errorMessage}" class="alert alert-danger py-2 mb-3" style="font-size: 13px;">
                        <i class="bi bi-exclamation-circle me-1"></i> <span th:text="${errorMessage}">Error</span>
                    </div>
                    <div th:if="${successMessage}" class="alert alert-success py-2 mb-3" style="font-size: 13px;">
                        <i class="bi bi-check-circle me-1"></i> <span th:text="${successMessage}">Success</span>
                    </div>
                    <form th:action="@{/payroll/save}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Employee <span style="color: #ef4444;">*</span></label>
                                <select name="employeeId" class="form-select" required>
                                    <option value="">Select employee...</option>
                                    <option th:each="emp : ${employees}"
                                            th:value="${emp.id}"
                                            th:text="${emp.firstName + ' ' + emp.lastName + ' — ' + emp.department}">Sarah Johnson</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Pay Period <span style="color: #ef4444;">*</span></label>
                                <input type="month" name="payPeriod" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Basic Salary ($)</label>
                                <input type="number" step="0.01" min="0" name="basicSalary" class="form-control" placeholder="0.00" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Allowances ($)</label>
                                <input type="number" step="0.01" min="0" name="allowances" class="form-control" placeholder="0.00" value="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Deductions ($)</label>
                                <input type="number" step="0.01" min="0" name="deductions" class="form-control" placeholder="0.00" value="0">
                            </div>
                            <div class="col-12 d-flex gap-2 justify-content-end pt-3 border-top">
                                <a th:href="@{/payroll}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i> Generate
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
