<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Payroll — StaffSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Payroll', 'Generate salary for an employee')}"></div>

        <div class="page-content">
            <div class="page-header">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/payroll}">Payroll</a></li>
                        <li class="breadcrumb-item active">Generate Payroll</li>
                    </ol>
                </nav>
                <h3>Generate Payroll</h3>
                <p>Create a new payroll record for an employee</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Employee <span style="color: #ef4444;">*</span></label>
                                <select class="form-select">
                                    <option>Select employee...</option>
                                    <option>Sarah Johnson — Engineering</option>
                                    <option>Michael Chen — Marketing</option>
                                    <option>Emily Rodriguez — Finance</option>
                                    <option>David Kim — Engineering</option>
                                    <option>Lisa Thompson — HR</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Pay Period <span style="color: #ef4444;">*</span></label>
                                <input type="month" class="form-control" value="2026-06">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Basic Salary</label>
                                <input type="number" class="form-control" placeholder="Auto-filled" readonly style="background: #f8fafc;">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Allowances ($)</label>
                                <input type="number" class="form-control" placeholder="0.00" value="5000">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Deductions ($)</label>
                                <input type="number" class="form-control" placeholder="0.00" value="2000">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Remarks</label>
                                <input type="text" class="form-control" placeholder="Optional notes">
                            </div>
                            <div class="col-12 d-flex gap-2 justify-content-end pt-3 border-top">
                                <a th:href="@{/payroll}" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg me-1"></i> Generate
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
