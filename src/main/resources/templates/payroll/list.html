<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll — StaffSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <link th:href="@{/css/staffsync.css}" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/navbar :: navbar('Payroll', 'Manage salary and payslips')}"></div>

        <div class="page-content">
            <div class="page-header d-flex justify-content-between align-items-center">
                <div>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
                            <li class="breadcrumb-item active">Payroll</li>
                        </ol>
                    </nav>
                    <h3>Payroll Records</h3>
                    <p>All payroll records</p>
                </div>
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/payroll/generate}" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-1"></i> Generate Payroll
                </a>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Department</th>
                                    <th>Month</th>
                                    <th>Basic</th>
                                    <th>Allowances</th>
                                    <th>Deductions</th>
                                    <th>Net Salary</th>
                                    <th>Status</th>
                                    <th>Payslip</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="pay : ${payrolls}">
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <div class="avatar-circle avatar-sm" style="background: #1a56db;"
                                                 th:style="${'background: ' + (pay.id % 2 == 0 ? '#7c3aed' : '#1a56db')}">
                                                <span th:text="${#strings.substring(pay.employee.firstName, 0, 1) + #strings.substring(pay.employee.lastName, 0, 1)}">SJ</span>
                                            </div>
                                            <span style="font-weight: 500;" th:text="${pay.employee.firstName + ' ' + pay.employee.lastName}">Sarah Johnson</span>
                                        </div>
                                    </td>
                                    <td th:text="${pay.employee.department}">Engineering</td>
                                    <td th:text="${pay.payPeriod}">June 2026</td>
                                    <td th:text="${'$' + #numbers.formatDecimal(pay.basicSalary, 0, 'COMMA', 0, 'POINT')}">$85,000</td>
                                    <td th:text="${'$' + #numbers.formatDecimal(pay.allowances, 0, 'COMMA', 0, 'POINT')}">$8,500</td>
                                    <td th:text="${'$' + #numbers.formatDecimal(pay.deductions, 0, 'COMMA', 0, 'POINT')}">$4,250</td>
                                    <td style="font-weight: 700;" th:text="${'$' + #numbers.formatDecimal(pay.netSalary, 0, 'COMMA', 0, 'POINT')}">$89,250</td>
                                    <td>
                                        <span class="badge-status" th:classappend="${pay.status == 'PAID' ? 'active' : 'pending'}"
                                              th:text="${pay.status}">PAID</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/payroll/payslip/{id}(id=${pay.id})}" class="btn btn-sm btn-outline-primary" title="View Payslip">
                                            <i class="bi bi-file-text"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="~{fragments/footer :: footer}"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
